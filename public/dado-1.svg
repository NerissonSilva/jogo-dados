<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.4" flood-color="#a855f7" />
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="84" height="84" rx="20" fill="url(#bg)" stroke="rgba(255,255,255,0.2)" stroke-width="2" filter="url(#shadow)" />
  <circle cx="50" cy="50" r="8" fill="#ffffff" filter="url(#dotGlow)" />
</svg>
